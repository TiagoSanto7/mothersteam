# Docker Compose de produção — Mother's Team
# Sobe: backend Fastify + MySQL 8
# Nginx no host faz reverse proxy pra api.santoti.com → 127.0.0.1:3001
#
# Uso na VPS:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#   (ou com symlink .env → .env.production, dispensa o --env-file)
#
# Primeira vez, depois de subir:
#   docker compose -f docker-compose.prod.yml exec api npx prisma db push
#   docker compose -f docker-compose.prod.yml exec api npx prisma db seed  # opcional

# YAML anchor pra log rotation compartilhado — evita disco encher em prod
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  mysql:
    image: mysql:8
    container_name: mothersteam-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: mothers_team
      MYSQL_USER: mothers
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mothersteam-mysql-data:/var/lib/mysql
    networks:
      - mothersteam-net
    # NÃO expõe porta pro host — só acessível dentro do compose network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # Cap de recurso pra não engolir a VPS se algum query rodar louco
    mem_limit: 1g
    cpus: 1.0
    logging: *default-logging

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: mothersteam-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: mysql://mothers:${MYSQL_PASSWORD}@mysql:3306/mothers_team
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_SECRET: ${REFRESH_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      ELEVENLABS_SARA_VOICE_ID: ${ELEVENLABS_SARA_VOICE_ID}
    volumes:
      - mothersteam-uploads:/app/uploads
    ports:
      # Bind APENAS em 127.0.0.1 — só nginx (no host) enxerga.
      # Nada exposto direto pra internet.
      - "127.0.0.1:3001:3001"
    networks:
      - mothersteam-net
    # Healthcheck via Node http.get (evita depender de curl/wget na imagem)
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    # Cap conservador — Fastify + Prisma + tsx cabem folgado
    mem_limit: 512m
    cpus: 0.5
    logging: *default-logging

volumes:
  mothersteam-mysql-data:
  mothersteam-uploads:

networks:
  mothersteam-net:
    driver: bridge
