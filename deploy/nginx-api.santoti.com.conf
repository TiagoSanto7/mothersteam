# /etc/nginx/sites-available/api.santoti.com
# Reverse proxy pra o container mothersteam-api rodando em 127.0.0.1:3001.
# Cloudflare intermedeia HTTPS na borda; internamente é HTTP.
#
# Após criar em sites-available:
#   sudo ln -s /etc/nginx/sites-available/api.santoti.com /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx

# Cloudflare IP ranges — restore real client IP em logs e X-Forwarded-For.
# Lista atualizada em https://www.cloudflare.com/ips/
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

server {
    listen 80;
    listen [::]:80;
    server_name api.santoti.com;

    # Uploads podem ter até 5MB (backend limit). Deixa 10 pra folga.
    client_max_body_size 10M;

    # Logs separados por domínio ajudam a debugar
    access_log /var/log/nginx/api.santoti.com.access.log;
    error_log  /var/log/nginx/api.santoti.com.error.log;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # Headers padrão de reverse proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Hardcodamos "https" (não $scheme) porque nginx só escuta em 80 aqui —
        # Cloudflare termina TLS na borda e sempre bate no origin em HTTP. Sem
        # este hardcode, o Fastify pensa que toda request é HTTP: não seta
        # cookies com Secure flag, gera redirects com URL http://, etc.
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;

        # SSE (Server-Sent Events) exige long-lived connection
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        proxy_cache off;

        # Sem Connection: close — deixa keep-alive
        proxy_set_header Connection "";
    }
}
